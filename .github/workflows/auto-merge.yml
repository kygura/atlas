name: Auto-merge routine branch

on:
  push:
    branches-ignore:
      - master
      - main

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create PR and merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          branch=${GITHUB_REF#refs/heads/}
          pr_url=$(gh pr list --head "$branch" --json url --jq '.[0].url' || true)
          if [ -z "$pr_url" ]; then
            pr_url=$(gh pr create --base main --head "$branch" --title "Routine update from $branch" --body "Auto-generated scan results.")
          fi
          # Try an immediate merge first; it doesn't depend on the repo's
          # "Allow auto-merge" setting, which has intermittently been off and
          # left routine PRs (e.g. #10) stranded with "Auto merge is not
          # allowed for this repository". Fall back to --auto only if the
          # immediate merge is rejected (e.g. pending required checks).
          gh pr merge "$pr_url" --squash || gh pr merge "$pr_url" --squash --auto
