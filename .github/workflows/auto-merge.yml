name: Auto-merge routine branch

on:
  push:
    branches-ignore:
      - master
      - main

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for commits ahead of main
        id: check
        run: |
          git fetch origin main
          ahead=$(git rev-list --count origin/main..HEAD)
          echo "ahead=$ahead" >> "$GITHUB_OUTPUT"

      - name: Create PR and merge
        if: steps.check.outputs.ahead != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          branch=${GITHUB_REF#refs/heads/}
          pr_url=$(gh pr list --head "$branch" --json url --jq '.[0].url' || true)
          if [ -z "$pr_url" ]; then
            pr_url=$(gh pr create --base main --head "$branch" --title "Routine update from $branch" --body "Auto-generated scan results.")
          fi
          gh pr merge "$pr_url" --squash
